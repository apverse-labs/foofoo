name: Sync Cloudinary Images to DB (Direct)

# One-shot workflow — run manually from GitHub Actions tab
# Prerequisites:
#   Add these as Repository Secrets (Settings → Secrets → Actions):
#   - CLOUDINARY_API_KEY    (from cloudinary.com → Settings → API Keys)
#   - CLOUDINARY_API_SECRET (from cloudinary.com → Settings → API Keys)
#   - SUPABASE_SERVICE_ROLE_KEY (from supabase.com → project Settings → API)
#   - SUPABASE_URL          (from supabase.com → project Settings → API, e.g. https://xxx.supabase.co)
on:
  workflow_dispatch:

jobs:
  sync:
    name: Sync Cloudinary → dishes.cloudinary_public_id
    runs-on: ubuntu-latest

    steps:
      - name: Run Cloudinary → Supabase sync
        uses: actions/github-script@v7
        env:
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          CLOUDINARY_CLOUD_NAME: dzlqsobol
        with:
          script: |
            const apiKey    = process.env.CLOUDINARY_API_KEY;
            const apiSecret = process.env.CLOUDINARY_API_SECRET;
            const supabaseUrl = process.env.SUPABASE_URL;
            const serviceKey  = process.env.SUPABASE_SERVICE_ROLE_KEY;
            const cloudName   = process.env.CLOUDINARY_CLOUD_NAME;

            if (!apiKey || !apiSecret || !supabaseUrl || !serviceKey) {
              core.setFailed('Missing required secrets. Check CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY in repo Settings → Secrets → Actions.');
              return;
            }

            // ── 1. Fetch all Cloudinary images (paginated) ──────────────────
            const authHeader = 'Basic ' + Buffer.from(`${apiKey}:${apiSecret}`).toString('base64');
            const allResources = [];
            let nextCursor = null;

            do {
              const url = new URL(`https://api.cloudinary.com/v1_1/${cloudName}/resources/image`);
              url.searchParams.set('max_results', '500');
              if (nextCursor) url.searchParams.set('next_cursor', nextCursor);

              const resp = await fetch(url.toString(), { headers: { Authorization: authHeader } });
              if (!resp.ok) {
                const body = await resp.text();
                core.setFailed(`Cloudinary API error ${resp.status}: ${body}`);
                return;
              }
              const data = await resp.json();
              allResources.push(...data.resources);
              nextCursor = data.next_cursor ?? null;
              console.log(`Fetched ${allResources.length} assets so far...`);
            } while (nextCursor);

            console.log(`\nTotal Cloudinary assets: ${allResources.length}`);

            // ── 2. Fetch all dishes from Supabase ────────────────────────────
            const dishResp = await fetch(`${supabaseUrl}/rest/v1/dishes?select=id,name&limit=5000`, {
              headers: {
                'apikey': serviceKey,
                'Authorization': `Bearer ${serviceKey}`,
              }
            });
            if (!dishResp.ok) {
              core.setFailed(`Supabase dishes fetch failed: ${await dishResp.text()}`);
              return;
            }
            const dishes = await dishResp.json();
            console.log(`Total dishes: ${dishes.length}`);

            // Build slug → dish lookup
            const slugToDish = new Map();
            for (const d of dishes) {
              const slug = d.name.toLowerCase().replace(/\s+/g, '_');
              slugToDish.set(slug, { id: d.id, name: d.name });
            }

            // ── 3. Match Cloudinary assets → dishes ──────────────────────────
            const matched = [];
            const unmatched = [];

            for (const asset of allResources) {
              // Strip folder prefix if present
              const filename = asset.public_id.split('/').pop() ?? asset.public_id;
              // Extract base slug: "curd_rice_hero_01_qxxbm7" → "curd_rice"
              const heroIdx = filename.indexOf('_hero_01_');
              const baseSlug = heroIdx !== -1
                ? filename.slice(0, heroIdx)
                : filename.split('_').slice(0, -1).join('_');

              const dish = slugToDish.get(baseSlug);
              if (dish) {
                matched.push({ dishId: dish.id, dishName: dish.name, publicId: asset.public_id });
              } else {
                unmatched.push({ publicId: asset.public_id, baseSlug });
              }
            }

            console.log(`\nMatched: ${matched.length} dishes`);
            console.log(`Unmatched: ${unmatched.length} assets`);

            if (matched.length === 0) {
              console.log('\n⚠️  No matches found. Check that your Cloudinary images follow the naming convention:');
              console.log('   <dish_name_with_underscores>_hero_01_<cloudinary_id>');
              console.log('   Example: "curd_rice_hero_01_qxxbm7" matches dish named "Curd Rice"');
              if (unmatched.length > 0) {
                console.log('\nFirst 10 unmatched assets:');
                unmatched.slice(0, 10).forEach(u => console.log(`  ${u.publicId} → slug: ${u.baseSlug}`));
              }
              return;
            }

            // ── 4. Update dishes in Supabase ─────────────────────────────────
            let updateOk = 0, updateErr = 0;
            const BATCH = 50;

            for (let i = 0; i < matched.length; i += BATCH) {
              const batch = matched.slice(i, i + BATCH);
              await Promise.all(batch.map(async (m) => {
                const r = await fetch(
                  `${supabaseUrl}/rest/v1/dishes?id=eq.${m.dishId}`,
                  {
                    method: 'PATCH',
                    headers: {
                      'apikey': serviceKey,
                      'Authorization': `Bearer ${serviceKey}`,
                      'Content-Type': 'application/json',
                      'Prefer': 'return=minimal',
                    },
                    body: JSON.stringify({ cloudinary_public_id: m.publicId }),
                  }
                );
                if (r.ok) { updateOk++; }
                else {
                  updateErr++;
                  console.error(`Failed to update dish ${m.dishId} (${m.dishName}): ${await r.text()}`);
                }
              }));
              console.log(`Updated batch ${Math.floor(i/BATCH)+1}/${Math.ceil(matched.length/BATCH)} (${Math.min(i+BATCH, matched.length)}/${matched.length})`);
            }

            // ── 5. Print summary ─────────────────────────────────────────────
            console.log('\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
            console.log(`✅  Updated successfully:  ${updateOk} dishes`);
            if (updateErr > 0) console.log(`❌  Update errors:         ${updateErr}`);
            console.log(`⚠️   Unmatched Cloudinary assets: ${unmatched.length}`);
            console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n');

            if (matched.length > 0) {
              console.log('Matched dishes:');
              matched.forEach(m => console.log(`  ✓ [${m.dishId}] ${m.dishName} → ${m.publicId}`));
            }
            if (unmatched.length > 0) {
              console.log('\nUnmatched assets (check naming convention):');
              unmatched.forEach(u => console.log(`  ✗ ${u.publicId} (slug: ${u.baseSlug})`));
            }

            if (updateErr > 0) {
              core.setFailed(`${updateErr} update(s) failed — check logs above`);
            }

name: E2E Browser Tests

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'App URL to test (defaults to VERCEL_URL secret; falls back to local dev server)'
        required: false
        default: ''
      browser:
        description: 'Browser to test (chromium/firefox/webkit/all)'
        required: false
        default: 'chromium'
      suite:
        description: 'Test suite filter (TC001/TC002/TC003/TC004/TC005/TC006 or blank for all)'
        required: false
        default: ''
  push:
    branches: [main, apverse-labs-RE]
    paths:
      - 'foofoo-tests/e2e/**'
      - 'foofoo/app/**'
      - 'foofoo/src/**'
      - 'foofoo/src/re-engine/**'
      - 'foofoo/src/repositories/re-*.ts'
      - 'foofoo/src/services/re-*.ts'

jobs:
  e2e-browser-tests:
    name: E2E Browser Tests
    runs-on: ubuntu-latest

    env:
      # ── Test user credentials for pre-seeded Supabase accounts ───────────────
      E2E_VEG_USER_EMAIL:    ${{ secrets.E2E_VEG_USER_EMAIL }}
      E2E_VEG_USER_PASSWORD: ${{ secrets.E2E_VEG_USER_PASSWORD }}
      E2E_NONVEG_USER_EMAIL:    ${{ secrets.E2E_NONVEG_USER_EMAIL }}
      E2E_NONVEG_USER_PASSWORD: ${{ secrets.E2E_NONVEG_USER_PASSWORD }}
      # ── Supabase credentials forwarded to the Expo webServer ─────────────────
      # Mapped from SUPABASE_* secrets so playwright.config.ts can inject them
      # into the local Expo dev server when VERCEL_URL is not set.
      EXPO_PUBLIC_SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      # ── External app URL (optional) ───────────────────────────────────────────
      # When set, Playwright skips the local webServer and tests the deployed app.
      VERCEL_URL: ${{ secrets.VERCEL_URL }}

    defaults:
      run:
        working-directory: foofoo-tests

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup Node 22 ─────────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          # Cache both lockfiles so both sets of node_modules are cached
          cache-dependency-path: |
            foofoo-tests/package-lock.json
            foofoo/package-lock.json

      # ── 3. Install foofoo-tests dependencies ─────────────────────────────────
      - name: Install test dependencies
        run: npm ci

      # ── 4. Install foofoo app dependencies ────────────────────────────────────
      # Required when VERCEL_URL is absent: playwright.config.ts starts the Expo
      # web server via webServer.command which runs inside foofoo/. The cache
      # step above makes this <5 s on cache hit.
      - name: Install app dependencies
        run: npm ci
        working-directory: foofoo

      # ── 5. Install Playwright browsers ───────────────────────────────────────
      # Install only the requested browser in dispatch; all browsers on push/main
      - name: Install Playwright browsers (single)
        if: github.event_name == 'workflow_dispatch' && inputs.browser != 'all'
        run: npx playwright install ${{ inputs.browser }} --with-deps

      - name: Install Playwright browsers (all)
        if: github.event_name != 'workflow_dispatch' || inputs.browser == 'all'
        run: npx playwright install --with-deps

      # ── 6. Resolve BASE_URL ───────────────────────────────────────────────────
      # Priority: dispatch input → VERCEL_URL secret → localhost (webServer)
      - name: Set BASE_URL
        id: set-url
        run: |
          if [ -n "${{ inputs.base_url }}" ]; then
            echo "BASE_URL=${{ inputs.base_url }}" >> "$GITHUB_ENV"
            echo "Resolved BASE_URL from dispatch input: ${{ inputs.base_url }}"
          elif [ -n "${{ secrets.VERCEL_URL }}" ]; then
            echo "BASE_URL=${{ secrets.VERCEL_URL }}" >> "$GITHUB_ENV"
            echo "Resolved BASE_URL from VERCEL_URL secret"
          else
            echo "BASE_URL=http://localhost:8081" >> "$GITHUB_ENV"
            echo "BASE_URL not set — playwright.config.ts will start a local Expo web server"
          fi

      # ── 7. Build Playwright project + grep filters ────────────────────────────
      - name: Build test filters
        id: filters
        run: |
          # Project name (without quoting — passed via env var to avoid shell
          # escaping issues with spaces in names like "Desktop Chrome")
          BROWSER="${{ inputs.browser }}"
          if [ "$BROWSER" = "webkit" ]; then
            echo "PROJECT_NAME=Mobile Safari (iPhone 14)" >> "$GITHUB_OUTPUT"
          elif [ "$BROWSER" = "all" ]; then
            echo "PROJECT_NAME=" >> "$GITHUB_OUTPUT"
          else
            # chromium, firefox (mapped to Chrome), or empty → Desktop Chrome
            echo "PROJECT_NAME=Desktop Chrome" >> "$GITHUB_OUTPUT"
          fi

          # Suite grep filter
          SUITE="${{ inputs.suite }}"
          if [ -n "$SUITE" ]; then
            echo "GREP=$SUITE" >> "$GITHUB_OUTPUT"
          else
            echo "GREP=" >> "$GITHUB_OUTPUT"
          fi

      # ── 8. Run Playwright tests ───────────────────────────────────────────────
      # Note: --reporter is intentionally NOT passed on the CLI.
      # playwright.config.ts registers all reporters (html, junit, qa-reporter,
      # github/list). Passing --reporter on the CLI overrides the config and
      # prevents qa-summary.md from being written by the custom reporter.
      #
      # Project name and grep are passed via shell variables to handle spaces
      # in project names (e.g. "Desktop Chrome") without quoting issues.
      - name: Run E2E browser tests
        id: playwright
        env:
          PW_PROJECT: ${{ steps.filters.outputs.PROJECT_NAME }}
          PW_GREP:    ${{ steps.filters.outputs.GREP }}
        run: |
          CMD="npx playwright test --config=e2e/playwright.config.ts"
          if [ -n "$PW_PROJECT" ]; then
            CMD="$CMD --project '$PW_PROJECT'"
          fi
          if [ -n "$PW_GREP" ]; then
            CMD="$CMD --grep '$PW_GREP'"
          fi
          eval "$CMD"
        continue-on-error: true    # Fail the job explicitly below after uploading artifacts

      # ── 9. Upload artifacts ───────────────────────────────────────────────────
      - name: Upload E2E report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-${{ github.run_number }}
          path: |
            foofoo-tests/reports/e2e/
          retention-days: 30

      # ── 10. Print QA summary to GitHub Step Summary ───────────────────────────
      - name: Print QA summary to GitHub Step Summary
        if: always()
        run: |
          SUMMARY="reports/e2e/qa-summary.md"
          if [ -f "$SUMMARY" ]; then
            cat "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## E2E QA Report" >> "$GITHUB_STEP_SUMMARY"
            echo "qa-summary.md was not generated (reporter may have failed or tests did not run)." >> "$GITHUB_STEP_SUMMARY"
          fi

      # ── 11. Fail job if any test failed ──────────────────────────────────────
      # Playwright exits with code 1 when tests fail. We captured that in
      # continue-on-error above so artifacts upload first, then fail here.
      - name: Fail job if tests failed
        if: steps.playwright.outcome == 'failure'
        run: |
          echo "One or more E2E browser tests failed. See the uploaded report artifact for details."
          exit 1

name: RE QA Suite

on:
  push:
    branches:
      - apverse-labs-RE
  pull_request:
    branches:
      - develop
      - main
    paths:
      - 'foofoo/src/repositories/re-*.ts'
      - 'foofoo/src/services/re-*.ts'
      - 'foofoo/src/re-engine/**'
      - 'foofoo/src/components/re/**'
      - 'foofoo-tests/unit/re-*.ts'
      - 'foofoo-tests/integration/re-*.ts'
      - 'foofoo-tests/personas/re-*.ts'
      - 'Meal_Planning_RE_Engine/**'

jobs:
  # ── Layer 1: Unit tests (pure functions, no DB) ──────────────────────────────
  unit:
    name: Unit — RE pure functions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: foofoo-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: foofoo-tests/package-lock.json
      - run: npm ci
      - name: Run RE unit tests
        run: npx jest --testPathPattern='unit/re-' --no-coverage --ci

  # ── Layer 2: Schema + seed data (RE staging) ─────────────────────────────────
  schema:
    name: Schema + Seed — RE staging
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: foofoo-tests
    env:
      SUPABASE_STAGING_URL: ${{ secrets.SUPABASE_STAGING_URL }}
      SUPABASE_STAGING_ANON_KEY: ${{ secrets.SUPABASE_STAGING_ANON_KEY }}
      SUPABASE_STAGING_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_STAGING_SERVICE_ROLE_KEY }}
      SUPABASE_RE_SERVICE_KEY: ${{ secrets.SUPABASE_RE_SERVICE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: foofoo-tests/package-lock.json
      - run: npm ci
      - name: RE schema validation (24 tables + RLS)
        run: npx jest --testPathPattern='integration/re-schema-validation' --no-coverage --ci
      - name: RE seed integrity (counts + FK)
        run: npx jest --testPathPattern='integration/re-seed-integrity' --no-coverage --ci

  # ── Layer 2: MVP schema (production project) ─────────────────────────────────
  schema-mvp:
    name: Schema — MVP production
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: foofoo-tests
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: foofoo-tests/package-lock.json
      - run: npm ci
      - name: MVP schema validation (41 tables)
        run: npx jest --testPathPattern='integration/schema-validation' --no-coverage --ci

  # ── Layer 3: RE persona journeys — 50 personas, hard constraint gate ──────────
  personas:
    name: Personas — 50 users, 0 violations gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: foofoo-tests
    env:
      SUPABASE_STAGING_URL: ${{ secrets.SUPABASE_STAGING_URL }}
      SUPABASE_STAGING_ANON_KEY: ${{ secrets.SUPABASE_STAGING_ANON_KEY }}
      SUPABASE_STAGING_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_STAGING_SERVICE_ROLE_KEY }}
      SUPABASE_RE_SERVICE_KEY: ${{ secrets.SUPABASE_RE_SERVICE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: foofoo-tests/package-lock.json
      - run: npm ci
      - name: RE persona journeys (50 personas)
        run: npx jest --testPathPattern='integration/re-persona-journey' --no-coverage --ci
      - name: RE module integration
        run: npx jest --testPathPattern='integration/re-module-integration' --no-coverage --ci

  # ── Layer 5: Security + DPDP ─────────────────────────────────────────────────
  security:
    name: Security + DPDP — RE + MVP
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: foofoo-tests
    env:
      SUPABASE_STAGING_URL: ${{ secrets.SUPABASE_STAGING_URL }}
      SUPABASE_STAGING_ANON_KEY: ${{ secrets.SUPABASE_STAGING_ANON_KEY }}
      SUPABASE_STAGING_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_STAGING_SERVICE_ROLE_KEY }}
      SUPABASE_RE_SERVICE_KEY: ${{ secrets.SUPABASE_RE_SERVICE_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: foofoo-tests/package-lock.json
      - run: npm ci
      - name: RE RLS cross-user security
        run: npx jest --testPathPattern='integration/re-rls-security' --no-coverage --ci
      - name: RE DPDP compliance
        run: npx jest --testPathPattern='integration/re-dpdp-compliance' --no-coverage --ci
      - name: MVP RLS security
        run: npx jest --testPathPattern='integration/rls-security' --no-coverage --ci
      - name: MVP DPDP compliance
        run: npx jest --testPathPattern='integration/dpdp-compliance' --no-coverage --ci

  # ── Hard gate: blocks merge if any job fails or constraint violated ───────────
  constraint-gate:
    name: Hard Constraint Gate (merge block)
    runs-on: ubuntu-latest
    needs: [unit, schema, schema-mvp, personas, security]
    if: always()
    defaults:
      run:
        working-directory: foofoo-tests
    env:
      SUPABASE_STAGING_URL: ${{ secrets.SUPABASE_STAGING_URL }}
      SUPABASE_STAGING_ANON_KEY: ${{ secrets.SUPABASE_STAGING_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: foofoo-tests/package-lock.json
      - run: npm ci
      - name: Verify zero hard constraint violations across all 50 personas
        run: |
          npx jest --testPathPattern='integration/re-persona-journey' \
            --no-coverage --ci \
            --testNamePattern='total hard constraint violations'
      - name: Block merge if any suite failed
        if: contains(needs.*.result, 'failure')
        run: |
          echo "❌ One or more RE QA suites failed. Merge to develop/main is BLOCKED."
          exit 1
